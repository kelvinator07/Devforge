# Per-agent model + fallback config — hot-swappable without code change.
# Read by crew.py at task startup.
# Model strings are OpenRouter slugs (provider/model-id).

engineering_lead:
  model: openai/gpt-5.4-nano
  fallback:
    - openai/gpt-5-mini
    - anthropic/claude-sonnet-4-6

backend_engineer:
  model: openai/gpt-5.4-nano
  fallback:
    - openai/gpt-5-mini
    - anthropic/claude-sonnet-4-6

frontend_engineer:
  model: openai/gpt-5.4-nano
  fallback:
    - openai/gpt-5-mini
    - anthropic/claude-sonnet-4-6

qa_engineer:
  # Tool-heavy work; GPT 5 Mini is cost-optimized and plenty capable for gate-checks.
  model: openai/gpt-5-mini
  fallback:
    - openai/gpt-5.4-nano
    - anthropic/claude-sonnet-4-6
